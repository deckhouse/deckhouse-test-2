      pull_request: https://github.com/deckhouse/deckhouse/pull/17885
      impact: >-
        On fresh clusters, Dex storage CRDs (e.g. OfflineSessions/RefreshToken) are now installed by the
        module,

        preventing hook/informer startup failures due to absent `dex.coreos.com` CRDs.
    - summary: >-
        Fixed LDAP authentication failure when filter field contains trailing newline from YAML literal
        block scalar.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17950
    - summary: Migrate discover_apiserver_endpoints from deprecated Endpoints to EndpointSlice API
      pull_request: https://github.com/deckhouse/deckhouse/pull/18024
    - summary: Restore ContinueOnConnectorFailure flag handling in Dex configuration
