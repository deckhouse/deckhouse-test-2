      pull_request: https://github.com/deckhouse/deckhouse/pull/17305
      impact: >-
        DexAuthenticator resources with IP addresses in domain fields will now be rejected at creation/update
        time with a clear error message. Previously, such resources were accepted but failed silently
        during Ingress creation.
