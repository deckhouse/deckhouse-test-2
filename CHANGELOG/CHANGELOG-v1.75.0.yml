admission-policy-engine:
  features:
    - summary: Added policy to deny exec/attach to pods with heritage deckhouse label.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16749
  fixes:
    - summary: Allow DELETE operations, add containerPorts check in case of hostNetwork
      pull_request: https://github.com/deckhouse/deckhouse/pull/17084
    - summary: >-
        Added and extend unit tests to cover tri-state behavior (omitted / empty / non-empty) and nested
        empty-array cases for both hooks.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17308
    - summary: >-
        Fixed tri-state semantics for empty arrays and avoided empty objects in OperationPolicy/SecurityPolicy
        values.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17343
    - summary: fix namespaceSelector for constraints, add CRDs
      pull_request: https://github.com/deckhouse/deckhouse/pull/17344
    - summary: Fix the test launch in CI
      pull_request: https://github.com/deckhouse/deckhouse/pull/17549
    - summary: Fix constraint templates, add additional tests
      pull_request: https://github.com/deckhouse/deckhouse/pull/17561
    - summary: update tests for templates
      pull_request: https://github.com/deckhouse/deckhouse/pull/17665
    - summary: >-
        Fixed multiple CVEs in admission-policy-engine module images (ratify, gatekeeper) by updating.
        dependencies.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17667
    - summary: uncomment git apply string to apply the gatekeeper patches
      pull_request: https://github.com/deckhouse/deckhouse/pull/17783
    - summary: Fixed a bootstrap deadlock by excluding Gatekeeper webhook pods from constraints.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17791
    - summary: Fix ValidatingAdmissionPolicy for label gatekeeper.sh/operation=webhook
      pull_request: https://github.com/deckhouse/deckhouse/pull/17831
    - summary: Additional fix ValidatingAdmissionPolicy for label gatekeeper.sh/operation=webhook
      pull_request: https://github.com/deckhouse/deckhouse/pull/17884
    - summary: added mount-points in ratify
      pull_request: https://github.com/deckhouse/deckhouse/pull/17925
    - summary: Add system:sudouser in ValidatingAdmissionPolicyBinding excludes
      pull_request: https://github.com/deckhouse/deckhouse/pull/17933
    - summary: Convert constraints multi-line output to single-line
      pull_request: https://github.com/deckhouse/deckhouse/pull/18028
    - summary: >-
        Prevent unintended Gatekeeper constraints from being rendered for SecurityPolicy when boolean
        fields are omitted.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18007
      impact: >-
        Workload Pods are no longer denied by unrelated SecurityPolicy checks (e.g. hostNetwork/hostPort)
        when corresponding policy fields are not explicitly set.
    - summary: Fix high resource consumption for constraint d8denyexecheritage
      pull_request: https://github.com/deckhouse/deckhouse/pull/19099
    - summary: Fixed enforcementAction for D8ReplicaLimits, added more template tests.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19521
    - summary: Refactor main documentation page
      pull_request: https://github.com/deckhouse/deckhouse/pull/20048
candi:
  features:
    - summary: Added annotation for node by creating converger user.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16734
    - summary: >-
        Implementing SecurityPolicyExceptions in modules cert-manager, user-authz, user-authn, multitenancy-manager,
        admission-policy-engine, basic-auth.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16738
    - summary: Added parsing oss.yaml file in werf.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17567
    - summary: Display lists of third-party (OSS) components in the modules documentation.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17530
    - summary: >-
        Added support for Kubernetes 1.35 and discontinued support for Kubernetes 1.30. Default Kubernetes
        version was changed 1.32->1.33.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17504
      impact: The minimum supported version of Kubernetes is now 1.31. All control plane components will
        restart.
    - summary: Added support for multiple Kubernetes v1.35 feature gates.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18044
    - summary: Enable DRA alpha feature gates for multi allocations
      pull_request: https://github.com/deckhouse/deckhouse/pull/17993
      impact: Kubelet, api-server, controller-manager and scheduler will be restarted.
  fixes:
    - summary: >-
        Added a Netplan override to force the secondary NIC to use the main routing table, fixing cloud-init
        PBR conflicts.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16625
    - summary: Added bashible events generateName.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16768
    - summary: power commands wrapper fix
      pull_request: https://github.com/deckhouse/deckhouse/pull/16828
    - summary: d8-shutdown-inhibitor systemd enable fix.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16948
    - summary: version_map.yaml fix
      pull_request: https://github.com/deckhouse/deckhouse/pull/16954
    - summary: Ensure etcd dir has permissions 700 on all masters.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16967
    - summary: Added fallback to dnf package manager from yum install and remove bashbooster func's.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17012
    - summary: Added bashible 064 step criDir fallback.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16934
    - summary: Made modify_user in add_node_user bashible step idempotent.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17111
    - summary: remove excessive netcat calls from d8-shutdown-inhibitor
      pull_request: https://github.com/deckhouse/deckhouse/pull/17153
    - summary: >-
        Add pause and kubernetes-api-proxy registry packages to bashible `bb-package-fetch` to prevent
        node failures during containerd major upgrades.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17047
    - summary: Moved the default values for registry in initConfiguration to dhctl.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16103
    - summary: Updated the bashible step to include Linux kernel versions that address CVE-2025-37999
      pull_request: https://github.com/deckhouse/deckhouse/pull/17300
    - summary: >-
        Allow manually stopping DVP node VirtualMachines in nested clusters by using runPolicy AlwaysOnUnlessStoppedManually.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17110
    - summary: Remove duplicate `additional_disks_hashes` definition in static-node Terraform module.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17441
    - summary: Server bootstrap logs are no longer transmitted via nc; Python is used instead.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17451
    - summary: Disabled kernel.panic parameter check in kubelet.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17296
    - summary: Improved static node cleanup script.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17418
    - summary: Keep cloud-provider-dvp stuff in one place
      pull_request: https://github.com/deckhouse/deckhouse/pull/17910
    - summary: Updated pwru tool to v1.0.11 to fix CVE-2025-68121.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17952
    - summary: Fixed CVEs in `cloud-provider-azure`.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18067
    - summary: fix CVE in cloud-provider-azure
      pull_request: https://github.com/deckhouse/deckhouse/pull/18177
    - summary: Fix containerd unmount for migration if /var/lib/containerd is mounted manually.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19213
    - summary: fix cve node-manager and opentofu.
      pull_request: https://github.com/deckhouse/deckhouse/pull/19942
cert-manager:
  features:
    - summary: Bumped version up to v1.19.2.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17486
      impact: >-
        Breaking changes:

        - The default value of `Certificate.Spec.PrivateKey.RotationPolicy` is now `Always`.

        - The default value for the `Certificate` resource's `revisionHistoryLimit` field is now set to
        1.

        - Metrics changes. A high cardinality label, called `path`, was removed from the `certmanager_acme_client_request_count
        `and `certmanager_acme_client_request_duration_seconds` metrics.

        Feature:

        - Added the ability to configure requests and limits for pods used for ACME HTTP-01 challenges.
        Configurable in the `Issuer` and `ClusterIssuer` objects. For configuring the built-in  DKP CluserIssers
        (`letsencrypt` and `letsencrypt-staging`) added settings in moduleConfig.
    - summary: Add alerts for ACME Challenges stuck in pending or error states
      pull_request: https://github.com/deckhouse/deckhouse/pull/18669
  fixes:
    - summary: update RBAC for `certificaterequests` and `orders.acme.cert-manager.io` objects
      pull_request: https://github.com/deckhouse/deckhouse/pull/17616
    - summary: Disable SecurityPolicyExceptions for cert-manager namespace
      pull_request: https://github.com/deckhouse/deckhouse/pull/19280
