        shape. Nested `virtualMachine` fields are used and memory quantities like `Gi` are properly parsed.
    - summary: >-
        Fix cluster-autoscaler deadlock when machine creation fails with a non-ResourceExhausted error,
        preventing scale-up to alternative node groups.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18154
    - summary: >-
        Fixed GPU observability in node-manager for full GPU, MIG, and time-slicing workloads (dashboard
        links/queries, VRAM semantics, MIG slice visibility), stabilized DCGM profiling metrics pipeline,
        synced MIG profile config with upstream, and made custom MIG defaults explicit for unspecified
        GPU indexes.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18287
    - summary: >-
        deploy capi controller and webhooks before basic resources to prevent race condition during upgrades.
      pull_request: https://github.com/deckhouse/deckhouse/pull/18778
    - summary: >-
        fix Cluster Autoscaler RBAC for CAPI providers, add missing machinedeployments/scale to write
        rule and patch verb to ClusterRole.
