      pull_request: https://github.com/deckhouse/deckhouse/pull/16196
    - summary: Improved support for custom CA in the GitLab Dex provider (refined version of PR
      pull_request: https://github.com/deckhouse/deckhouse/pull/15825
    - summary: >-
        Introduced `UserOperation` hook for local Dex user operations (reset password, reset 2FA, lock/unlock)
        with status reporting.
      pull_request: https://github.com/deckhouse/deckhouse/pull/15561
  fixes:
    - summary: Fix login error 500 with password policy enabled.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16703
    - summary: Fix BadRequest after the change password redirect when password policy is enabled
      pull_request: https://github.com/deckhouse/deckhouse/pull/16744
    - summary: Added a warning that DexAuthenticator only works over HTTPS.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16721
    - summary: >-
        skipApproval no longer bypasses TOTP. When 2FA is enabled, users are sent to /totp before approval,
        so “auth request does not have an identity for approval” no longer occurs
      pull_request: https://github.com/deckhouse/deckhouse/pull/16946
    - summary: Quote service names to prevent digit-only names from breaking yaml parser
      pull_request: https://github.com/deckhouse/deckhouse/pull/17020
    - summary: Enabled hide internal error details from users in Dex to prevent information disclosure.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17177
