      pull_request: https://github.com/deckhouse/deckhouse/pull/17518
    - summary: Improved Dex LDAP Kerberos (SPNEGO) logs and error handling.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17543
    - summary: Temporary remove user operation hook
      pull_request: https://github.com/deckhouse/deckhouse/pull/17883
