        namespaces.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17090
    - summary: Added BulkSubjectAccessReview API for checking multiple permissions in a single request.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17080
    - summary: Added AccessibleNamespaces API to list namespaces accessible to the requesting user.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17436
    - summary: Restrict user roles from listing namespaces; use AccessibleNamespaces in non-CE editions
      pull_request: https://github.com/deckhouse/deckhouse/pull/17651
  fixes:
    - summary: Allow project-scoped roles to access Cluster-wide objects
      pull_request: https://github.com/deckhouse/deckhouse/pull/16896
    - summary: >-
        cache namespace label checks in the user-authz webhook via informer to avoid per-request apiserver
        GETs
      pull_request: https://github.com/deckhouse/deckhouse/pull/16920
    - summary: Add securityPolicyException for webhook daemonset
      pull_request: https://github.com/deckhouse/deckhouse/pull/17573
    - summary: Fixed SecurityPolicyException usage, added CR presence check.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17660
    - summary: Allowed node-local `user-authz-webhook` listener port (40443/TCP) for hostNetwork pods.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17656
      impact: >-
        The `user-authz-webhook` DaemonSet now explicitly declares its listener port and has a matching

        SecurityPolicyException. This prevents Admission Policy Engine validation failures in-cluster.

        A targeted `dmt lint` exception is added for the `host-network-ports` rule because it enforces

        the 4200–4299 range and does not take SecurityPolicyException into account.
    - summary: Updated logo on the authentication page.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17540
    - summary: Rename 'group' field to 'groups' in WebhookResourceSpec
      pull_request: https://github.com/deckhouse/deckhouse/pull/17902
vertical-pod-autoscaler:
  features:
    - summary: Updated vpa module to 1.5.1.
      pull_request: https://github.com/deckhouse/deckhouse/pull/16814
      impact: >-
        Mode `Auto` is deprecated and will be removed in a future API version. Use explicit modes like
        `Recreate`, `Initial`, or `InPlaceOrRecreate` instead.
    - summary: >-
        InPlaceOrRecreate allows in-place resize when replica group is below minReplicas; eviction fallback
        is blocked in that case.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17725
      impact: >-
        Single-replica (or small) workloads with VPA InPlaceOrRecreate can now receive resource updates
        via in-place resize.

        Eviction/recreate is still forbidden when live replicas are below minReplicas, so availability
        is not reduced.
  fixes:
    - summary: Fixed VPA mode validation webhook. Restored some wrong changes.
      pull_request: https://github.com/deckhouse/deckhouse/pull/17095
